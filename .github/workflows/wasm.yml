name: wasm

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  release:
    types: ["published"]

concurrency:
  group: ${{ github.workflow }}.${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tests:
    name: wasm ci
    if: github.repository == 'GRID4EARTH/healpix-geo'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: js

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Create rust cache
        if: github.event_name != 'release'
        # zizmor: ignore[cache-poisoning] # not used for releases
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          prefix-key: wasm32

      - name: setup rust
        run: |
          cargo install wasm-pack@0.15.0

      - name: run tests
        run: |
          wasm-pack test --headless --firefox
          wasm-pack test --headless --chrome

  build-bundle:
    name: build
    needs: tests
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'release'
      || (
        github.event_name == 'pull_request'
        && contains(github.event.pull_request.labels.*.name, 'release')
      )

    defaults:
      run:
        working-directory: js

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: setup rust
        run: |
          cargo install wasm-pack@0.15.0

      # - name: build node bundle
      #   run: |
      #     mkdir -p build/nodejs
      #     wasm-pack build --release --target nodejs --out-name index --out-dir build/nodejs

      # - name: build esm bundle
      #   run: |
      #     mkdir -p build/esm
      #     wasm-pack build --release --target web --out-name index --out-dir build/esm

      - name: build bundler bundle
        run: |
          mkdir -p build/bundler
          wasm-pack build --release --target bundler --out-name index --out-dir build/bundler

      - name: modify package contents
        run: |
          mkdir pkg
          cp build/bundler/index* pkg/
          jq '.files = ["*"] | .module = ["index.js"] | .types = ["index.d.ts"] | .name = "healpix-geo" | .repository.url = "git+https://github.com/GRID4EARTH/healpix-geo.git"' build/bundler/package.json > pkg/package.json

      - name: pack the package
        run: |
          wasm-pack pack pkg

          jq '.name = "healpix-geo"' pkg/package.json > package.json.tmp
          mv package.json.tmp pkg/package.json

      # - name: assemble package
      #   run: |
      #     mkdir -p pkg/{node,esm,bundler}

      #     cp build/bundler/index* pkg/bundler
      #     cp build/esm/index* pkg/esm
      #     cp build/nodejs/index* pkg/node

      #     cp build/bundler/package.json pkg/

      #     # minimal package.json for esm
      #     echo '{"type": "module"}' > pkg/esm/package.json

      #     jq '.files = ["*"] | .module = "bundler/index.js" | .types = "bundler/index.d.ts" | .name = "healpix-geo"' pkg/package.json > package.json.tmp
      #     mv package.json.tmp pkg/package.json

      - name: Upload package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bundle
          path: js/pkg/healpix-geo*.tgz
          if-no-files-found: "error"

  release:
    name: publish
    runs-on: ubuntu-latest
    needs: build-bundle
    if: |
      needs.build-bundle.result == 'success'
      && github.event_name == 'release'

    environment:
      name: npm
      url: https://npmjs.com/package/healpix-geo

    permissions:
      id-token: write # upload packages to npm

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bundle
          path: dist
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "26"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false # never use caching in release builds
      - name: unpack
        working-directory: dist
        run: tar xvfz healpix-geo*.tgz
      - name: publish
        working-directory: dist/package
        run: |
          npm stage publish

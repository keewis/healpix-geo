name: Build wheels

on:
  release:
    types:
      - published
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-ci-trigger:
    name: detect ci trigger
    if: github.repository == 'GRID4EARTH/healpix-geo'
    runs-on: ubuntu-slim
    outputs:
      triggered: ${{ steps.detect-trigger.outputs.trigger-found }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 2

      - uses: xarray-contrib/ci-trigger@10cd2bfec3484946a4058a421ddf9cfad101e715 # v1.2.1
        id: detect-trigger-tag
        with:
          keyword: "[build-wheels]"

      - name: Detect label
        id: detect-trigger-label
        env:
          LABEL_FOUND: ${{ contains(github.event.pull_request.labels.*.name, 'build-wheels') }}
        run: |
          echo "label-found=$LABEL_FOUND" >> "$GITHUB_OUTPUT"

      - name: Merge
        id: detect-trigger
        env:
          TAG_FOUND: ${{ steps.detect-trigger-tag.outputs.trigger-found }}
          LABEL_FOUND: ${{ steps.detect-trigger-label.outputs.label-found }}
        run: |
          if [[ "$TAG_FOUND" == "true" || "$LABEL_FOUND" == "true" ]]; then
              echo "trigger-found=true" >> "$GITHUB_OUTPUT";
          else
              echo "trigger-found=false" >> "$GITHUB_OUTPUT";
          fi

  linux:
    name: linux ${{ matrix.target }}
    needs: detect-ci-trigger
    if: |
      github.event_name == 'release'
      || (
        github.event_name == 'pull_request'
        && needs.detect-ci-trigger.outputs.triggered == 'true'
      )
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false

      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          - runner: ubuntu-22.04
            target: x86
          - runner: ubuntu-22.04
            target: aarch64
          - runner: ubuntu-22.04
            target: armv7
          - runner: ubuntu-22.04
            target: s390x
          - runner: ubuntu-22.04
            target: ppc64le
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.10"

      - name: Build wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out ../../dist --find-interpreter
          sccache: "false"
          manylinux: auto
          working-directory: python/healpix-geo

      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: dist

  musllinux:
    name: musllinux ${{ matrix.target }}
    needs: detect-ci-trigger
    if: |
      github.event_name == 'release'
      || (
        github.event_name == 'pull_request'
        && needs.detect-ci-trigger.outputs.triggered == 'true'
      )
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          - runner: ubuntu-22.04
            target: x86
          - runner: ubuntu-22.04
            target: aarch64
          - runner: ubuntu-22.04
            target: armv7
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.10"

      - name: Build wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out ../../dist --find-interpreter
          sccache: "false"
          manylinux: musllinux_1_2
          working-directory: python/healpix-geo

      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-musllinux-${{ matrix.platform.target }}
          path: dist

  windows:
    name: windows ${{ matrix.target }}
    needs: detect-ci-trigger
    if: |
      github.event_name == 'release'
      || (
        github.event_name == 'pull_request'
        && needs.detect-ci-trigger.outputs.triggered == 'true'
      )
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: windows-latest
            target: x64
          - runner: windows-latest
            target: x86
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          architecture: ${{ matrix.platform.target }}
          python-version: "3.10"

      - name: Build wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out ../../dist --find-interpreter
          sccache: "false"
          working-directory: python/healpix-geo

      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: dist

  macos:
    name: macos ${{ matrix.target }}
    needs: detect-ci-trigger
    if: |
      github.event_name == 'release'
      || (
        github.event_name == 'pull_request'
        && needs.detect-ci-trigger.outputs.triggered == 'true'
      )
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: macos-15-intel
            target: x86_64
          - runner: macos-15
            target: aarch64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.10"

      - name: Build wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out ../../dist --find-interpreter
          sccache: "false"
          working-directory: python/healpix-geo

      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: dist

  # sdist:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
  #     - name: Build sdist

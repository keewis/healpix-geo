name: Rust CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}.${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  cache-pixi-lock:
    name: cache pixi.lock
    if: github.repository == 'GRID4EARTH/healpix-geo'
    runs-on: ubuntu-slim
    outputs:
      cache-key: ${{ steps.pixi-lock.outputs.cache-key }}
      pixi-version: ${{ steps.pixi-lock.outputs.pixi-version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: Parcels-code/pixi-lock/create-and-cache@38495788b79a5ff26009aecc15daa9a8310b8832 # v0.1.0
        id: pixi-lock
        with:
          hash-files: |
            pixi.toml
            Cargo.toml
            python/healpix-geo/pyproject.toml
            python/healpix-geo/pixi.toml

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: cache-pixi-lock

    strategy:
      matrix:
        env: ["ci-py313"]

    defaults:
      run:
        shell: bash -l {0}

    env:
      FORCE_COLOR: 3
      ENV: ${{ matrix.env }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # - name: Install Rust
      #   run: |
      #     rustup update stable
      #     rustup default stable
      #     rustup component add clippy

      - uses: Parcels-code/pixi-lock/restore@38495788b79a5ff26009aecc15daa9a8310b8832 # v0.1.0
        with:
          cache-key: ${{ needs.cache-pixi-lock.outputs.cache-key }}

      - name: setup environment
        uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          environments: "${{ matrix.env }}"

      - name: Create rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Help finding installed libraries
        run: |
          export CONDA_PREFIX=$(pixi run -e $ENV --frozen 'echo $CONDA_PREFIX')
          if [[ -z "$CONDA_PREFIX" ]]; then
            echo "CONDA_PREFIX is unset!"
            exit 1
          fi

          pushd $CONDA_PREFIX
          echo "PKG_CONFIG_PATH=$(readlink -f lib/pkgconfig)" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=$(readlink -f lib)" >> $GITHUB_ENV
          popd

      - name: Help the linker on macos
        if: runner.os == 'MacOS'
        run: |
          export CONDA_PREFIX=$(pixi run -e $ENV --frozen 'echo $CONDA_PREFIX')

          if [ ! -d target/debug/deps ]; then
              mkdir -p target/debug/deps
              ln -s $CONDA_PREFIX/lib/*.dylib target/debug/deps/
          fi

      - name: Cargo clippy
        run: |
          pixi run -e $ENV lint-rust

  tests:
    name: Rust tests
    needs: cache-pixi-lock
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        env: ["rust"]
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]

    defaults:
      run:
        shell: bash -l {0}

    env:
      FORCE_COLOR: 3
      ENV: ${{ matrix.env }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: Parcels-code/pixi-lock/restore@38495788b79a5ff26009aecc15daa9a8310b8832 # v0.1.0
        with:
          cache-key: ${{ needs.cache-pixi-lock.outputs.cache-key }}

      - name: setup environment
        uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          environments: "${{ matrix.env }}"

      - name: Create rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Help finding installed libraries
        run: |
          export CONDA_PREFIX=$(pixi run -e $ENV --frozen 'echo $CONDA_PREFIX')
          if [[ -z "$CONDA_PREFIX" ]]; then
            echo "CONDA_PREFIX is unset!"
            exit 1
          fi

          pushd $CONDA_PREFIX
          echo "PKG_CONFIG_PATH=$(readlink -f lib/pkgconfig)" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=$(readlink -f lib)" >> $GITHUB_ENV
          popd

      - name: Help the linker on macos
        if: runner.os == 'MacOS'
        run: |
          export CONDA_PREFIX=$(pixi run -e $ENV --frozen 'echo $CONDA_PREFIX')

          if [ ! -d target/debug/deps ]; then
              mkdir -p target/debug/deps
              ln -s $CONDA_PREFIX/lib/*.dylib target/debug/deps/
          fi

      - name: Cargo clippy
        run: |
          pixi run -e $ENV rust-tests

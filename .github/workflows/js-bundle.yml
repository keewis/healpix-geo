name: wasm

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}.${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-bundle:
    if: github.repository == 'GRID4EARTH/healpix-geo'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Create rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # 2.9.1

      - name: setup rust
        run: |
          # TODO: pin
          cargo install wasm-pack

      - name: build node bundle
        run: |
          cd js
          mkdir -p build/nodejs
          wasm-pack build --release --target nodejs --out-dir build/nodejs

          ls -l build/nodejs

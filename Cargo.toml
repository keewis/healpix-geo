[workspace]
members = [
  "rust/healpix-geo-core",
  "python/healpix-geo",
]
resolver = "2"

[workspace.package]
version = "0.0.12"
authors = ["Justus Magin <keewis@posteo.de>"]
edition = "2024"
license = "Apache-2.0"
repository = "https://github.com/EOPF-DGGS/healpix-geo"
categories = ["science::geo"]

[workspace.dependencies]
cdshealpix = "0.9.1"
moc = "0.19.1"
numpy = "0.27.1"
pyo3 = { version = "0.27.2", features = ["auto-initialize"] }
rayon = "1.11.0"
geodesy = "0.14.0"
itertools = "0.14.0"
healpix-geo-core = { path = "rust/healpix-geo-core" }
